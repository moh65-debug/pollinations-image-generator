<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator - Pollinations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .content {
            padding: 40px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        .prompt-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
            resize: vertical;
            min-height: 100px;
        }

        .prompt-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
        }

        select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .image-container {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: #f5f5f5;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .generated-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 1rem;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #667eea;
            color: white;
        }

        .examples {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .examples h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #333;
        }

        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .example-chip {
            padding: 8px 16px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .example-chip:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .content {
                padding: 25px;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ AI Image Generator</h1>
            <p>Create stunning images from text descriptions</p>
        </div>

        <div class="content">
            <div class="input-section">
                <label for="prompt">What would you like to create?</label>
                <textarea 
                    id="prompt" 
                    class="prompt-input" 
                    placeholder="Describe your image in detail... (e.g., 'A serene mountain landscape at sunset with a crystal clear lake reflecting the orange sky')"
                ></textarea>
            </div>

            <div class="options-grid">
                <div class="option-group">
                    <label for="model">AI Model</label>
                    <select id="model">
                        <option value="flux">Flux (Default)</option>
                        <option value="flux-realism">Flux Realism</option>
                        <option value="flux-anime">Flux Anime</option>
                        <option value="flux-3d">Flux 3D</option>
                        <option value="turbo">Turbo (Fast)</option>
                    </select>
                </div>

                <div class="option-group">
                    <label for="size">Image Size</label>
                    <select id="size">
                        <option value="1024x1024">Square (1024x1024)</option>
                        <option value="1280x720">Landscape (1280x720)</option>
                        <option value="720x1280">Portrait (720x1280)</option>
                        <option value="1920x1080">Wide (1920x1080)</option>
                    </select>
                </div>
            </div>

            <button class="generate-btn" onclick="generateImage()">
                Generate Image
            </button>

            <div class="examples">
                <h3>Try these examples:</h3>
                <div class="example-chips">
                    <span class="example-chip" onclick="useExample('A futuristic city with flying cars at night, neon lights, cyberpunk style')">Cyberpunk City</span>
                    <span class="example-chip" onclick="useExample('A cute robot gardener tending to colorful flowers in a sunny garden')">Robot Gardener</span>
                    <span class="example-chip" onclick="useExample('Abstract art with vibrant colors, geometric shapes, modern style')">Abstract Art</span>
                    <span class="example-chip" onclick="useExample('A magical forest with glowing mushrooms and fireflies, fantasy illustration')">Magic Forest</span>
                    <span class="example-chip" onclick="useExample('Professional portrait of a business woman in modern office, natural lighting')">Professional Portrait</span>
                </div>
            </div>

            <div class="result-section" id="resultSection">
                <div class="image-container" id="imageContainer">
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <div class="loading-text">Creating your image...</div>
                    </div>
                    <img id="generatedImage" class="generated-image" style="display: none;">
                </div>

                <div class="action-buttons">
                    <button class="action-btn" onclick="downloadImage()">Download</button>
                    <button class="action-btn" onclick="copyImageUrl()">Copy URL</button>
                    <button class="action-btn" onclick="generateAgain()">Generate Again</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentImageUrl = '';

        function useExample(promptText) {
            document.getElementById('prompt').value = promptText;
        }

        function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            
            if (!prompt) {
                alert('Please enter a description for your image');
                return;
            }

            const model = document.getElementById('model').value;
            const size = document.getElementById('size').value;
            const [width, height] = size.split('x');

            const resultSection = document.getElementById('resultSection');
            const loading = document.getElementById('loading');
            const generatedImage = document.getElementById('generatedImage');
            const generateBtn = document.querySelector('.generate-btn');

            resultSection.classList.add('active');
            loading.style.display = 'block';
            generatedImage.style.display = 'none';
            generateBtn.disabled = true;

            const encodedPrompt = encodeURIComponent(prompt);
            currentImageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${width}&height=${height}&model=${model}&nologo=true`;

            generatedImage.onload = function() {
                loading.style.display = 'none';
                generatedImage.style.display = 'block';
                generateBtn.disabled = false;
            };

            generatedImage.onerror = function() {
                loading.style.display = 'none';
                alert('Failed to generate image. Please try again.');
                generateBtn.disabled = false;
            };

            generatedImage.src = currentImageUrl;
        }

        function downloadImage() {
            if (!currentImageUrl) return;
            
            const link = document.createElement('a');
            link.href = currentImageUrl;
            link.download = 'ai-generated-image.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function copyImageUrl() {
            if (!currentImageUrl) return;
            
            navigator.clipboard.writeText(currentImageUrl).then(() => {
                alert('Image URL copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy URL');
            });
        }

        function generateAgain() {
            generateImage();
        }

        document.getElementById('prompt').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                generateImage();
            }
        });
    </script>
</body>
</html>
